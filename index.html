<!DOCTYPE html>
<html>
<head>
<title>WhatsApp OTP Test</title>
<style>
body{
font-family:Arial;
text-align:center;
margin-top:80px;
}

input{
padding:10px;
margin:10px;
width:220px;
}

button{
padding:10px 20px;
background:#25D366;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}
</style>
</head>

<body>

<h2>WhatsApp OTP Verification Demo</h2>

<input type="text" id="phone" placeholder="Enter Mobile Number"><br>

<button onclick="sendOTP()">Send OTP via WhatsApp</button><br>

<input type="text" id="otp" placeholder="Enter OTP"><br>

<button onclick="verifyOTP()">Verify OTP</button>

<p id="result"></p>

<script>

let generatedOTP;

function sendOTP(){

generatedOTP = Math.floor(1000 + Math.random() * 9000);

let phone = document.getElementById("phone").value;

let message = "My OTP code is: " + generatedOTP;

let url = "https://wa.me/91" + phone + "?text=" + encodeURIComponent(message);

window.open(url, "_blank");

alert("OTP Generated: " + generatedOTP + " (Demo ke liye dikhaya gaya)");
}

function verifyOTP(){

let userOTP = document.getElementById("otp").value;

if(userOTP == generatedOTP){
document.getElementById("result").innerHTML = "✅ OTP Verified Successfully";
}else{
document.getElementById("result").innerHTML = "❌ Wrong OTP";
}

}

</script>

</body>
</html>
